<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="hsl(353 78% 74%)" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="hsl(231 42% 14%)" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="hsl(231 42% 8%)"/>
    </radialGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(353 78% 80%)"/>
      <stop offset="100%" stop-color="hsl(14 95% 78%)"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(46 100% 85%)"/>
      <stop offset="100%" stop-color="hsl(46 100% 70%)"/>
    </linearGradient>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="hsl(353 80% 82%)" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="hsl(353 70% 60%)" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(46 90% 80%)" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="hsl(353 70% 70%)" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="600" height="800" fill="url(#bgGrad)"/>

  <!-- soft glow blobs -->
  <circle cx="120" cy="120" r="170" fill="hsl(353 78% 74%)" opacity="0.25" filter="url(#soft)"/>
  <circle cx="500" cy="700" r="200" fill="hsl(46 100% 75%)" opacity="0.18" filter="url(#soft)"/>
  <circle cx="480" cy="180" r="90" fill="hsl(14 95% 80%)" opacity="0.18" filter="url(#soft)"/>

  <!-- flowing wave lines (calm / mind) -->
  <g stroke="hsl(353 78% 74%)" stroke-width="1.2" fill="none" opacity="0.45">
    <path d="M -20 620 C 120 560, 220 700, 360 620 S 580 540, 640 600"/>
    <path d="M -20 660 C 120 600, 220 740, 360 660 S 580 580, 640 640" opacity="0.6"/>
    <path d="M -20 700 C 120 640, 220 780, 360 700 S 580 620, 640 680" opacity="0.4"/>
  </g>

  <!-- central bloom (psychology / growth symbol) -->
  <g transform="translate(300 380)">
    <!-- petals -->
    <g opacity="0.92">
      <ellipse cx="0" cy="-110" rx="46" ry="100" fill="url(#petalGrad)" transform="rotate(0)"/>
      <ellipse cx="0" cy="-110" rx="46" ry="100" fill="url(#petalGrad)" transform="rotate(60)" opacity="0.9"/>
      <ellipse cx="0" cy="-110" rx="46" ry="100" fill="url(#petalGrad)" transform="rotate(120)" opacity="0.85"/>
      <ellipse cx="0" cy="-110" rx="46" ry="100" fill="url(#petalGrad)" transform="rotate(180)" opacity="0.9"/>
      <ellipse cx="0" cy="-110" rx="46" ry="100" fill="url(#petalGrad)" transform="rotate(240)" opacity="0.85"/>
      <ellipse cx="0" cy="-110" rx="46" ry="100" fill="url(#petalGrad)" transform="rotate(300)" opacity="0.9"/>
    </g>
    <!-- inner petals -->
    <g opacity="0.85">
      <ellipse cx="0" cy="-60" rx="22" ry="50" fill="url(#yellowGrad)" transform="rotate(30)"/>
      <ellipse cx="0" cy="-60" rx="22" ry="50" fill="url(#yellowGrad)" transform="rotate(90)"/>
      <ellipse cx="0" cy="-60" rx="22" ry="50" fill="url(#yellowGrad)" transform="rotate(150)"/>
      <ellipse cx="0" cy="-60" rx="22" ry="50" fill="url(#yellowGrad)" transform="rotate(210)"/>
      <ellipse cx="0" cy="-60" rx="22" ry="50" fill="url(#yellowGrad)" transform="rotate(270)"/>
      <ellipse cx="0" cy="-60" rx="22" ry="50" fill="url(#yellowGrad)" transform="rotate(330)"/>
    </g>
    <!-- core -->
    <circle r="26" fill="hsl(46 100% 90%)"/>
    <circle r="14" fill="hsl(353 78% 70%)"/>
    <circle r="5" fill="hsl(14 95% 95%)"/>
  </g>

  <!-- floating leaf/teardrops -->
  <g opacity="0.85">
    <path d="M 110 280 C 90 240, 130 200, 170 220 C 200 240, 180 290, 140 300 Z" fill="url(#leafGrad)"/>
    <path d="M 470 320 C 450 280, 490 240, 530 260 C 560 280, 540 330, 500 340 Z" fill="url(#leafGrad)" opacity="0.7"/>
    <path d="M 150 530 C 130 490, 170 450, 210 470 C 240 490, 220 540, 180 550 Z" fill="url(#leafGrad)" opacity="0.55"/>
  </g>

  <!-- small orbiting moods -->
  <g>
    <circle cx="180" cy="200" r="8" fill="hsl(46 100% 80%)" opacity="0.9"/>
    <circle cx="450" cy="180" r="6" fill="hsl(353 78% 80%)" opacity="0.9"/>
    <circle cx="500" cy="540" r="10" fill="hsl(14 95% 82%)" opacity="0.8"/>
    <circle cx="100" cy="500" r="7" fill="hsl(46 100% 80%)" opacity="0.85"/>
    <circle cx="380" cy="640" r="5" fill="hsl(353 78% 80%)" opacity="0.9"/>
  </g>

  <!-- subtle constellation lines -->
  <g stroke="hsl(353 78% 80%)" stroke-width="0.8" opacity="0.35" fill="none">
    <line x1="180" y1="200" x2="300" y2="270"/>
    <line x1="450" y1="180" x2="300" y2="270"/>
    <line x1="100" y1="500" x2="300" y2="490"/>
    <line x1="500" y1="540" x2="300" y2="490"/>
  </g>

  <!-- bottom horizon glow -->
  <ellipse cx="300" cy="800" rx="420" ry="120" fill="hsl(353 78% 74%)" opacity="0.18" filter="url(#soft)"/>
</svg>
